<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="#{search.title}">PC Search - Asset Management System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" th:href="@{/assets/logo.ico}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> -->
</head>
<body class="bg-success bg-gradient bg-opacity-10">
    <header th:fragment="header">
        <nav class="navbar navbar-expand bg-success text-white shadow">
            <div class="container-fluid mx-3">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <span class="navbar-brand fs-4 text-white"><i class="bi bi-pc-display"></i> <span th:text="#{search.header}">Asset Management System</span></span>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="nav nav-underline">
                        <!-- <li class="nav-item">
                            <a class="nav-link active text-white" href="/profile"><i class="bi bi-menu"></i> <span >プロフィール</span></a>
                        </li> -->
                        <li class="nav-item">
                            <a class="nav-link active text-white" aria-current="search" href="/search"><i class="bi bi-search"></i> <span th:text="#{search.search}">Search</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/registration"><i class="bi bi-plus-lg"></i> <span th:text="#{search.registration}">Register</span></a>
                        </li>
                        <!-- <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a class="nav-link text-white" href="/register"><i class="bi bi-plus-lg"></i><span>新規ユーザー</span></a>
                        </li> -->
                    </ul>
                <!-- </div>
                    <form class="d-flex" th:action="@{/logout}" method="post" role="logout">
                        <button class="btn btn-outline-light me-2" type="submit">
                            <span th:text="#{search.logout}">Logout</span>
                        </button>
                    </form>
                </div> -->
                <div class="dropdown ms-auto">
                    <button class="btn btn-outline-light dropdown-toggle"
                            type="button"
                            id="userDropdown"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">User</span>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li>
                            <a class="dropdown-item" th:href="@{/profile}">
                                <i class="bi bi-person"></i> プロフィール
                            </a>
                        </li>

                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item" th:href="@{/register}">
                                <i class="bi bi-person-plus"></i> 新規ユーザー
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <form th:action="@{/logout}" method="post" class="px-3">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right"></i>
                                    <span th:text="#{search.logout}">Logout</span>
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>

            </nav>
    </header>

    <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
    <script th:src="@{/js/bootstrap.bundle.min.js}" ></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> -->
    <!-- <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script> -->
</body>
</html>
