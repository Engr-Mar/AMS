<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="#{login.title}">Login - Asset Management System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" th:href="@{/assets/logo.ico}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            background-size: 40px 40px;
            background-image: radial-gradient(circle, #adb5bd 1px, rgba(0, 0, 0, 0) 1px);
        }
        h1 { font-family: Helvetica; }
        .card { max-inline-size: 28rem; inline-size: 100%; }
        .btn-close { margin-inline-start: 20px; }
    </style>
</head>
<body class="bg-success bg-gradient bg-opacity-10">
<header th:replace="~{header :: header}"></header>
<div class="mx-auto my-5 p-5">
    <h1 class="display-3 text-center" th:text="#{register.header}">Asset Management System</h1>
</div>

<div class="card position-absolute top-50 start-50 translate-middle border-success p-3 shadow">
    <div class="card-body">

        <div class="alert alert-success d-flex align-items-center" role="alert" th:if="${param.registered}">
            Registration successful. Please login.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${message}" class="alert alert-dismissible fade show"
             th:classappend="${messageType == 'success'} ? ' alert-success' :
                             (${messageType == 'error'} ? ' alert-danger' : ' alert-info')"
             role="alert">
            <span th:text="${message}">Default message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/register/add}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-floating mb-3">
                <input type="text" id="reg-username" name="username" class="form-control" placeholder="Username" required oninvalid="this.setCustomValidity('ユーザー名は空欄にできません')"
       oninput="this.setCustomValidity('')"/>
                <label for="reg-username" th:text="#{login.username}">Username</label>
            </div>
            <!-- <div class="form-floating mb-3">
                <select id="reg-role" name="role" class="form-select" required>
                    <option value="" disabled selected></option>
                    <option value="USER">ユーザー</option>
                    <option value="ADMIN">管理者</option>
                </select>
                <label for="reg-role">役割</label>
            </div> -->
            <div class="form-floating mb-3">
                <input type="password" id="reg-password" name="password" class="form-control" placeholder="Password" required oninvalid="this.setCustomValidity('パスワードは空欄にできません')"
       oninput="this.setCustomValidity('')" />
                <label for="reg-password" th:text="#{login.password}">Password</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" id="reg-confirmPassword" name="confirmpassword" class="form-control" placeholder="Confirm Password" required oninvalid="this.setCustomValidity('確認用パスワードは空欄にできません')"oninput="this.setCustomValidity('')" />
                <label for="reg-confirmPassword" th:text="#{login.confirmpassword}">Confirm Password</label>
            </div>
            
            <div class="d-grid gap-2">
                <button class="btn btn-success" type="submit" th:text="#{login.register}">Register</button>
            </div>
        </form>

    </div>
</div>

<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

<script>
    $(document).ready(function() {
        $("#locales").change(function () {
            const selectedLang = $(this).val();
            if(selectedLang) {
                window.location.replace('?lang=' + selectedLang);
            }
        });

        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('nav .nav-link');
        navLinks.forEach(link => {
            link.classList.remove('active');
            const href = link.getAttribute('href');
            if (!href) return;

            if ((href === '/search' && currentPath.startsWith('/search')) ||
                (href === '/registration' && (currentPath.startsWith('/registration') || currentPath.startsWith('/update'))) ||
                (href === '/profile' && currentPath.startsWith('/profile')) ||
                (href === '/register' && currentPath.startsWith('/register'))
            ) {
                link.classList.add('active');
            }
        });
        let messageType = /*[[${messageType}]]*/ null;

        if ($('.alert-success').length) {
            setTimeout(function () {
                window.location.href = '/register';
            }, 2000);
        }
    });
</script>

</body>
</html>
