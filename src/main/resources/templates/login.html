<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="#{login.title}">Login - Asset Management System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" th:href="@{/assets/logo.ico}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> -->
    <style>
        body {
            background-size: 40px 40px;
            background-image: radial-gradient(circle, #adb5bd 1px, rgba(0, 0, 0, 0) 1px);
        }
        h1 {
            font-family: Helvetica;
        }
    </style>
</head>
<body>
    <header class="fixed-top">
        <div class="mx-auto my-5 p-5">
            <h1 class="display-3 text-center" th:text="#{login.header}">Asset Management System</h1>
        </div>
    </header>
    <div class="card position-absolute top-50 start-50 translate-middle border-success p-3 shadow" style="inline-size: 24rem;">
        <div class="card-body">
            <div class="alert alert-danger d-flex align-items-center" role="alert" th:if="${param.error}">
                <div th:text="#{login.error}">Invalid username and password.</div>
            </div>
            <div class="alert alert-primary d-flex align-items-center" role="alert" th:if="${param.logout}">
                <div th:text="#{login.logout}">You have been logged out.</div>
            </div>
            <form th:action="@{/login}" method="post">
                <div class="form-floating mb-3">
                    <input type="text" name="username" class="form-control" th:placeholder="#{login.username}" aria-label="Username" aria-describedby="basic-addon1" autocomplete="on" required oninvalid="this.setCustomValidity('ユーザー名は空欄にできません')"
       oninput="this.setCustomValidity('')"/>
                    <label for="username" th:text="#{login.username}"></label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" name="password" class="form-control" th:placeholder="#{login.password}" aria-label="Password" aria-describedby="basic-addon2" required oninvalid="this.setCustomValidity('パスワードは空欄にできません')"
       oninput="this.setCustomValidity('')"/>
                    <label for="password" th:text="#{login.password}"></label>
                </div>
                <div class="d-grid gap-2">
                    <button class="btn btn-success" type="submit">
                        <span th:text="'  ' + #{login.login}">Login</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
    <script th:src="@{/js/bootstrap.bundle.min.js}" ></script>
    <script>
        $(document).ready(function() {
            $("#locales").change(function () {
                var selectedLang = $('#locales').val();
                if (selectedLang != ''){
                    window.location.replace('?lang=' + selectedLang);
                }
            });
        });
    </script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> -->
    <!-- <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script> -->
</body>
</html>
