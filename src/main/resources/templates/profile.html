<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title >MENU</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" th:href="@{/assets/logo.ico}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/menu.js}"></script>

</head>

<body class="bg-success bg-gradient bg-opacity-10">
    <header th:replace="~{header :: header}"></header>

    <div class="flex-grow-1 py-3 pe-3 result-panel w-75 
            d-flex justify-content-center align-items-center">
        <div class="card shadow-sm text-center p-4">

            <div class="mb-3">
                <img src="/assets/profile.jpg" alt="Logo" 
                    style="inline-size:200px; block-size:auto;">
            </div>

            <h1>プロフィール</h1>
            
            <p>User: <span sec:authentication="name"></span></p>
            <p>Roles: <span th:text="${#authentication.authorities[0].authority.replace('ROLE_', '')}"></span></p>
            <form th:action="@{/logout}" method="post">
                <input type="submit" value="Sign Out"/>
            </form>
        </div>
    </div>
</body>
</html>
